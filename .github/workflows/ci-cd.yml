# ==============================================================
#  CI / CD Pipeline — CI/CD Demo FastAPI Application
#
#  Jobs (run in dependency order):
#    1. quality-gate  → Black, isort, Flake8, mypy, Bandit, pip-audit
#    2. test          → pytest with 80% coverage gate
#    3. sonarcloud    → SonarCloud code quality & security analysis
#    4. docker-build  → build image, Trivy scan, push to Docker Hub
#                       (push only on main branch, not PRs)
# ==============================================================

name: CI/CD Pipeline

# ── TRIGGERS ───────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - develop
    paths:
      - "app/**"
      - "tests/**"
      - "main.py"
      - "requirements.txt"
      - "pyproject.toml"
      - "Dockerfile"
      - ".github/workflows/**"
      - "sonar-project.properties"

  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

  workflow_dispatch:
    inputs:
      push_image:
        description: "Push Docker image to Docker Hub?"
        type: boolean
        default: true

# Cancel in-progress run for same branch/PR on new commit
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── GLOBAL ENV VARS (non-sensitive) ────────────────────────────
env:
  PYTHON_VERSION: "3.11"
  REGISTRY: docker.io
  IMAGE_REPO: ${{ secrets.DOCKER_HUB_USERNAME }}/cicd-demo

# ==============================================================
# JOB 1 — Quality Gate
# Runs: Black → isort → Flake8 → mypy → Bandit → pip-audit
# ==============================================================
jobs:
  quality-gate:
    name: "🔍 Quality Gate"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Black — format check"
        run: black --check --diff app/ tests/ main.py

      - name: "isort — import order check"
        run: isort --check-only --diff app/ tests/ main.py

      - name: "Flake8 — lint"
        run: flake8 app/ tests/

      - name: "mypy — type check"
        run: mypy app/

      - name: "Bandit — security scan"
        run: bandit -r app/ -c .bandit

      - name: "pip-audit — dependency CVE check"
        run: pip-audit -r requirements.txt

  # ==============================================================
  # JOB 2 — Tests & Coverage
  # Runs pytest with 80% coverage enforcement.
  # ==============================================================
  test:
    name: "🧪 Tests & Coverage"
    runs-on: ubuntu-latest
    needs: quality-gate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: "pytest — run test suite with coverage"
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      # Upload coverage.xml so the sonarcloud job can use it
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ==============================================================
  # JOB 3 — SonarCloud Analysis
  # Deep code quality + security analysis using SonarCloud.
  #
  # Setup (one-time):
  #   1. Go to https://sonarcloud.io → log in with GitHub
  #   2. Import your repository
  #   3. Generate a token: My Account → Security → Generate Token
  #   4. Add to GitHub repo secrets:
  #        Name: SONAR_TOKEN
  #        Value: the token from step 3
  # ==============================================================
  sonarcloud:
    name: "📊 SonarCloud Analysis"
    runs-on: ubuntu-latest
    needs: test                      # Needs coverage.xml from test job

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # SonarCloud needs full git history to detect new issues vs. existing
          fetch-depth: 0

      # Download the coverage.xml produced by the test job
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      # Run SonarCloud analysis — uses sonar-project.properties automatically
      - name: "SonarCloud — code analysis"
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Auto-provided by GitHub
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}    # Add this to repo secrets
          SONAR_HOST_URL: https://sonarcloud.io       # Required for SonarCloud

  # ==============================================================
  # JOB 4 — Docker Build, Trivy Scan & Push
  # Builds image, scans for CVEs, pushes only on main branch.
  # ==============================================================
  docker-build:
    name: "🐳 Docker Build, Trivy & Push"
    runs-on: ubuntu-latest
    needs: [quality-gate, test]      # sonarcloud runs in parallel with docker-build

    permissions:
      contents: read
      packages: write
      security-events: write         # Required to upload SARIF to GitHub Security tab

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Docker Buildx ──────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Login to Docker Hub (skip on PRs) ─────────────────
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # ── 4. Generate smart image tags ─────────────────────────
      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── 5. Build Docker image (local only first for Trivy) ────
      - name: Build Docker image (local, for Trivy scan)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false                # Don't push yet — scan first
          load: true                 # Load into local Docker daemon for Trivy
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 6. Trivy — scan the built image for vulnerabilities ───
      # Outputs a human-readable table to the console
      - name: "Trivy — vulnerability scan (table)"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_REPO }}:latest
          format: table
          exit-code: "0"             # Show results but don't fail yet
          severity: "HIGH,CRITICAL"

      # Fail the pipeline if CRITICAL CVEs are found
      - name: "Trivy — fail on CRITICAL CVEs"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_REPO }}:latest
          format: sarif              # GitHub Security tab format
          output: trivy-results.sarif
          exit-code: "1"             # FAIL if CRITICAL CVE found
          severity: "CRITICAL"
          ignore-unfixed: true       # Ignore CVEs with no fix available

      # Upload Trivy SARIF → visible in GitHub Security → Code Scanning
      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()                 # Upload even if scan failed
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      # ── 7. Push image to Docker Hub (main branch only) ────────
      - name: Push Docker image to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        id: build
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 8. Print digest for traceability ─────────────────────
      - name: Print image digest
        if: github.event_name != 'pull_request'
        run: |
          echo "✅ Image pushed successfully!"
          echo "📦 Image: ${{ env.IMAGE_REPO }}"
          echo "🔖 Tags:  ${{ steps.meta.outputs.tags }}"
          echo "🔑 Digest: ${{ steps.build.outputs.digest }}"

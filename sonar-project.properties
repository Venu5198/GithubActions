# =============================================================
#  SonarQube / SonarCloud Project Configuration
#  Used by sonar-scanner CLI in both Jenkins and GitHub Actions.
# =============================================================

# ── Project identity ─────────────────────────────────────────
sonar.projectKey=cicd-demo
sonar.projectName=CI/CD Demo FastAPI
sonar.projectVersion=1.0.0

# ── SonarCloud organization (required for GitHub Actions / SonarCloud)
# This is your GitHub username in lowercase. Jenkins ignores this property.
sonar.organization=venu5198

# ── Source & test paths ──────────────────────────────────────
sonar.sources=app
sonar.tests=tests
sonar.inclusions=app/**/*.py
sonar.test.inclusions=tests/**/*.py

# ── Python version ───────────────────────────────────────────
sonar.python.version=3

# ── Coverage report (generated by pytest-cov) ────────────────
# Jenkins writes to:  reports/coverage.xml
# GitHub Actions writes to: coverage.xml
# sonar-scanner picks up whichever exists.
sonar.python.coverage.reportPaths=reports/coverage.xml,coverage.xml

# ── Encoding ─────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
